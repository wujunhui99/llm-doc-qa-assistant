openapi: 3.1.0
info:
  title: Smart Document QA Assistant HTTP API
  version: 0.3.0
  description: |
    Standalone API contract for `api-go` (`/api/*`).
    This file is the independent API documentation artifact for frontend/backend integration.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Documents
  - name: Threads
  - name: Config

paths:
  /:
    get:
      tags: [Health]
      summary: Service metadata
      operationId: getRootInfo
      responses:
        '200':
          description: Service name and version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootInfo'

  /api/health:
    get:
      tags: [Health]
      summary: API health
      operationId: getApiHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/config/health:
    get:
      tags: [Health]
      summary: Config route health alias
      operationId: getConfigHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current user
      operationId: me
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/documents:
    get:
      tags: [Documents]
      summary: List documents
      operationId: listDocuments
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/documents/upload:
    post:
      tags: [Documents]
      summary: Upload document
      description: |
        Supported extensions: `.txt`, `.md`, `.markdown`, `.pdf`.
        File size limit: 10MB.
      operationId: uploadDocument
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/documents/{document_id}:
    parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Documents]
      summary: Get document metadata
      operationId: getDocument
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Documents]
      summary: Delete document
      description: `confirm=true` is required.
      operationId: deleteDocument
      security:
        - BearerAuth: []
      parameters:
        - name: confirm
          in: query
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/documents/{document_id}/download:
    parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Documents]
      summary: Download document file
      operationId: downloadDocument
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Binary file stream
          headers:
            Content-Disposition:
              schema:
                type: string
            Content-Type:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/threads:
    get:
      tags: [Threads]
      summary: List threads
      operationId: listThreads
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Threads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListThreadsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Threads]
      summary: Create thread
      operationId: createThread
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThreadRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/threads/{thread_id}/turns:
    parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Threads]
      summary: Create turn (non-stream)
      operationId: createTurn
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTurnRequest'
      responses:
        '201':
          description: Turn created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTurnResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/threads/{thread_id}/turns/stream:
    parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Threads]
      summary: Create turn (SSE stream)
      description: |
        SSE events are emitted in this order:
        `message` -> `retrieval` -> multiple `delta` -> `final` -> `done`.
        On stream error, `event: error` is emitted and stream closes.
      operationId: createTurnStream
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTurnRequest'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                stream:
                  value: |
                    event: message
                    data: {"item_type":"message","payload":{"question":"hi","scope_type":"all","scope_doc_ids":[]}}

                    event: retrieval
                    data: {"item_type":"retrieval","payload":{"count":0,"citations":[]}}

                    event: delta
                    data: {"item_type":"delta","payload":{"delta":"你好"}}

                    event: final
                    data: {"item_type":"final","payload":{"answer":"你好","citations":[]}}

                    event: done
                    data: {}
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/threads/{thread_id}/turns/{turn_id}/stream:
    parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
      - name: turn_id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Threads]
      summary: Replay stored turn items as SSE
      operationId: replayTurnStream
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        default:
          $ref: '#/components/responses/ErrorResponse'

  /api/config:
    get:
      tags: [Config]
      summary: Get runtime provider config
      operationId: getConfig
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Config]
      summary: Set active provider
      operationId: setConfig
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetConfigRequest'
      responses:
        '200':
          description: Updated config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RootInfo:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
        version:
          type: string

    HealthResponse:
      type: object
      required: [status, time]
      properties:
        status:
          type: string
        time:
          type: string

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

    User:
      type: object
      required: [id, email, created_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string

    UserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, expires_at, user]
      properties:
        token:
          type: string
        expires_at:
          type: string
        user:
          $ref: '#/components/schemas/User'

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    Document:
      type: object
      required:
        - id
        - owner_user_id
        - name
        - size_bytes
        - mime_type
        - storage_path
        - status
        - chunk_count
        - created_at
        - last_updated_at
      properties:
        id:
          type: string
        owner_user_id:
          type: string
        name:
          type: string
        size_bytes:
          type: integer
          format: int64
        mime_type:
          type: string
        storage_path:
          type: string
        status:
          type: string
        chunk_count:
          type: integer
        created_at:
          type: string
        last_updated_at:
          type: string

    DocumentEnvelope:
      type: object
      required: [document]
      properties:
        document:
          $ref: '#/components/schemas/Document'

    ListDocumentsResponse:
      type: object
      required: [documents, total, page, page_size]
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    Thread:
      type: object
      required: [id, owner_user_id, title, created_at]
      properties:
        id:
          type: string
        owner_user_id:
          type: string
        title:
          type: string
        created_at:
          type: string

    ThreadEnvelope:
      type: object
      required: [thread]
      properties:
        thread:
          $ref: '#/components/schemas/Thread'

    ListThreadsResponse:
      type: object
      required: [threads]
      properties:
        threads:
          type: array
          items:
            $ref: '#/components/schemas/Thread'

    CreateThreadRequest:
      type: object
      properties:
        title:
          type: string

    CreateTurnRequest:
      type: object
      required: [message, scope_type, scope_doc_ids]
      properties:
        message:
          type: string
        scope_type:
          type: string
          enum: [all, doc]
        scope_doc_ids:
          type: array
          items:
            type: string
        think_mode:
          type: boolean
          deprecated: true
          description: Accepted for backward compatibility; currently ignored by runtime.

    Turn:
      type: object
      required:
        - id
        - thread_id
        - owner_user_id
        - question
        - answer
        - status
        - scope_type
        - scope_doc_ids
        - created_at
        - updated_at
      properties:
        id:
          type: string
        thread_id:
          type: string
        owner_user_id:
          type: string
        question:
          type: string
        answer:
          type: string
        status:
          type: string
        scope_type:
          type: string
        scope_doc_ids:
          type: array
          items:
            type: string
        created_at:
          type: string
        updated_at:
          type: string

    Citation:
      type: object
      required: [doc_id, doc_name, chunk_id, excerpt, score, chunk_index]
      properties:
        doc_id:
          type: string
        doc_name:
          type: string
        chunk_id:
          type: string
        excerpt:
          type: string
        score:
          type: integer
        chunk_index:
          type: integer

    TurnItem:
      type: object
      required: [id, turn_id, item_type, payload, created_at]
      properties:
        id:
          type: string
        turn_id:
          type: string
        item_type:
          type: string
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string

    CreateTurnResponse:
      type: object
      required: [turn, citations, items]
      properties:
        turn:
          $ref: '#/components/schemas/Turn'
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TurnItem'

    ConfigResponse:
      type: object
      required: [active_provider, available]
      properties:
        active_provider:
          type: string
        available:
          type: array
          items:
            type: string

    SetConfigRequest:
      type: object
      required: [active_provider]
      properties:
        active_provider:
          type: string
